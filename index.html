<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Agora টেস্ট পেজ</title>
  <script src="https://cdn.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
</head>
<body>
  <h3>Agora সংযোগ টেস্ট</h3>
  <p id="status">অপেক্ষা করছে...</p>
  <button id="startBtn">▶️ শুরু করুন</button>

  <script>
    const APP_ID = "3e98fdc6be38445f9e121e0ca61fef95";
    let client, track;

    function log(msg) {
      console.log("[TEST]", msg);
      document.getElementById("status").innerHTML += "<br>" + msg;
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      try {
        log("🔸 Agora SDK লোড হয়েছে?");

        // 1. ক্লায়েন্ট তৈরি
        client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        log("🔸 ক্লায়েন্ট তৈরি সফল");

        // 2. কানেকশন স্টেট মনিটর
        client.on("connection-state-change", (state) => {
          log("🔄 স্টেট: " + state);
        });

        // 3. মাইক ট্র্যাক তৈরি ও চালু
        track = await AgoraRTC.createMicrophoneAudioTrack();
        await track.setEnabled(true); // মাইক চালু
        log("🔸 মাইক ট্র্যাক তৈরি সফল");

        // 4. ইউনিক চ্যানেল নাম
        const channel = "test_" + Date.now();
        log("🔸 চ্যানেল নাম: " + channel);

        // 5. জয়েন ও পাবলিশ
        await client.join(APP_ID, channel, null, null);
        log("✅ join() সফল! UID পেয়েছি।");
        await client.publish(track);
        log("✅ publish() সফল! এখন মাইক অ্যাক্টিভ।");

        log("🎉 Agora পুরোপুরি সংযুক্ত!");
      } catch (err) {
        log("❌ ত্রুটি: " + err.message);
        console.error("বিস্তারিত:", err);
      }
    });
  </script>
</body>
</html>
