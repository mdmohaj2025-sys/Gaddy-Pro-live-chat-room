        * {

        body {

            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: floatBlob 12s ease-in-out infinite;
        }
        .bg-blob:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #ff85a2;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: #9b86f1;
            bottom: -120px;
            right: -80px;
            animation-delay: -5s;
        }
        .bg-blob:nth-child(3) {
            width: 250px;
            height: 250px;
            background: #6ec6ff;
            top: 50%;
            left: 60%;
            animation-delay: -8s;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.1); }
            50% { transform: translate(-20px, 30px) scale(0.9); }

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>
    let selectedGender = "";
    let cropper = null;
    let currentFile = null;
    let croppedImageBlob = null;
    let googleUser = null;

    function showProfileSetup() {
        document.getElementById('profile-setup-page').style.display = 'flex';
    }
    function hideProfileSetup() {
        document.getElementById('profile-setup-page').style.display = 'none';
    }
    function showPhonePage() {
        document.getElementById('phone-login-page').style.display = 'flex';
    }
    function hidePhonePage() {
        document.getElementById('phone-login-page').style.display = 'none';
    }

    function populateProfileWithGoogle(user) {
        googleUser = user;
        document.getElementById('nickname').value = user.displayName || "";
        document.getElementById('reg-email').value = user.email || "";
        
        const previewImg = document.getElementById('preview');
        const picIcon = document.getElementById('pic-icon');
        if (user.photoURL) {
            previewImg.src = user.photoURL;
            previewImg.style.display = 'block';
            picIcon.style.display = 'none';
        } else {
            previewImg.style.display = 'none';
            picIcon.style.display = 'block';
        }
        croppedImageBlob = null;
        showProfileSetup();
    }

    function openCropModal(event) {
        const file = event.target.files[0];
        if (!file) return;
        currentFile = file;

        const reader = new FileReader();
        reader.onload = function(e) {
            const cropImage = document.getElementById('crop-image');
            cropImage.src = e.target.result;
            document.getElementById('crop-modal').style.display = 'flex';

            if (cropper) cropper.destroy();
            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 2,
                autoCropArea: 0.8,
                responsive: true,
                background: false,
            });
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    }

    function applyCrop() {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
        canvas.toBlob(function(blob) {
            croppedImageBlob = blob;
            const url = URL.createObjectURL(blob);
            const previewImg = document.getElementById('preview');
            previewImg.src = url;
            previewImg.style.display = 'block';
            document.getElementById('pic-icon').style.display = 'none';

            document.getElementById('crop-modal').style.display = 'none';
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
        }, 'image/jpeg', 0.9);
    }

    function cancelCrop() {
        document.getElementById('crop-modal').style.display = 'none';
        if (cropper) {
            cropper.destroy();
            cropper = null;
        }
        currentFile = null;
    }

    function selectGender(gender) {
        selectedGender = gender;
        document.getElementById('male-btn').classList.remove('active');
        document.getElementById('female-btn').classList.remove('active');
        if (gender === 'Male') document.getElementById('male-btn').classList.add('active');
        else document.getElementById('female-btn').classList.add('active');
    }

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        // ★★★ এই লাইনটিই মূল পরিবর্তন — সব সময় অ্যাকাউন্ট বাছাই করার উইন্ডো দেখাবে ★★★

        document.getElementById('googleSignInBtn').addEventListener('click', async () => {

        document.getElementById('confirmRegBtn').addEventListener('click', async () => {

            const gender = window.selectedGender;

            if (!nick || !gender || !email) {
                alert("দয়া করে নাম, ইমেইল এবং লিঙ্গ পূরণ করুন!");

            document.getElementById('confirmRegBtn').disabled = true;
            document.getElementById('confirmRegBtn').innerText = "প্রক্রিয়া চলছে...";

            try {
                const usersRef = ref(db, 'users');
                const newUserRef = push(usersRef);
                const uniqueUserId = newUserRef.key;

                let photoURL = window.googleUser.photoURL || "";

                if (window.croppedImageBlob) {
                    const photoPath = `profile_pics/${uniqueUserId}.jpg`;

                }

                const profileData = {
                    userId: uniqueUserId,
                    firebaseUid: window.googleUser.uid,
                    nickname: nick,
                    lastname: lastname,
                    email: email,
                    gender: gender,

                    createdAt: new Date().toISOString()

                alert("কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন।");
            } finally {
                document.getElementById('confirmRegBtn').disabled = false;
                document.getElementById('confirmRegBtn').innerText = "কনফার্ম";
            }
        });

        window.populateProfileWithGoogle = window.populateProfileWithGoogle || populateProfileWithGoogle;
    </script>
