<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaddy Pro Final Gift Panel</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh; }
        h2 { margin-top: 15px; font-size: 18px; color: #ffcc00; text-transform: uppercase; }

        /* গিফট গ্রিড */
        .gift-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
        }

        .gift-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .gift-item.selected { border-color: #00e5ff; background: rgba(0, 229, 255, 0.1); }
        .gift-item img { width: 45px; height: 45px; margin-bottom: 5px; }
        .coin-text { display: block; color: #ffd700; font-size: 12px; font-weight: bold; }

        /* সেন্ড বাটন */
        .send-btn {
            position: fixed;
            bottom: 30px;
            padding: 12px 80px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        /* অ্যানিমেশন লেয়ার */
        #animationLayer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
            justify-content: center;
            align-items: center;
        }

        /* ভিডিও এবং ইমোজি স্টাইল */
        #displayVideo, #displayEmoji { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none;
            transition: all 1.5s ease-in-out; 
        }

        #displayEmoji {
            width: 180px;
            height: 180px;
            object-fit: contain;
            animation: popAndShrink 3s ease-in-out forwards;
        }

        /* ছোট হয়ে গায়েব হওয়ার এনিমেশন ক্লাস */
        .shrink-effect {
            transform: scale(0);
            opacity: 0;
        }

        @keyframes popAndShrink {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(0); opacity: 0; transform: translateY(-200px); }
        }
    </style>
</head>
<body>

    <h2>Premium Gift Shop</h2>

    <div class="gift-grid">
        <div class="gift-item" onclick="selectGift(this, 'video', 'https://github.com/mdmohaj2025-sys/Gaddy-Pro-live-chat-room/raw/refs/heads/main/GRNwcWsCmZtWZZKCsijaSOeRp0O.mp4')">
            <img src="https://img.icons8.com/emoji/96/volcano-emoji.png">
            <span class="coin-text">٩٩٩٩ 🪙</span>
        </div>

        <div class="gift-item" onclick="selectGift(this, 'video', 'https://github.com/mdmohaj2025-sys/Gaddy-Pro-live-chat-room/raw/refs/heads/main/8af340c51e22b4fc2c3d66ecde60f711.mp4')">
            <img src="https://img.icons8.com/emoji/96/rocket-emoji.png">
            <span class="coin-text">٧٥٠٠ 🪙</span>
        </div>

        <div class="gift-item" onclick="selectGift(this, 'video', 'https://github.com/mdmohaj2025-sys/Gaddy-Pro-live-chat-room/raw/refs/heads/main/2e5183f3caf5d5d6f29c0b2d5278b90f.mp4')">
            <img src="https://img.icons8.com/emoji/96/crown-emoji.png">
            <span class="coin-text">٥٠٠٠ 🪙</span>
        </div>

        <div class="gift-item" onclick="selectGift(this, 'emoji', 'https://img.icons8.com/emoji/96/rose.png')">
            <img src="https://img.icons8.com/emoji/96/rose.png">
            <span class="coin-text">١٠ 🪙</span>
        </div>
    </div>

    <button class="send-btn" onclick="sendGift()">SEND</button>

    <div id="animationLayer">
        <video id="displayVideo" playsinline></video>
        <img id="displayEmoji" src="" alt="gift">
    </div>

    <script>
        let currentType = '';
        let currentSource = '';

        function selectGift(el, type, source) {
            document.querySelectorAll('.gift-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            currentType = type;
            currentSource = source;
        }

        function sendGift() {
            const layer = document.getElementById('animationLayer');
            const video = document.getElementById('displayVideo');
            const emoji = document.getElementById('displayEmoji');

            if (!currentType) return alert('দয়া করে একটি গিফট সিলেক্ট করুন!');

            layer.style.display = 'flex';

            if (currentType === 'video') {
                emoji.style.display = 'none';
                video.style.display = 'block';
                video.src = currentSource;
                video.classList.remove('shrink-effect');
                video.currentTime = 0;
                video.play();

                // ভিডিও শেষ হওয়ার ১.৫ সেকেন্ড আগে ছোট হওয়া শুরু করবে
                video.ontimeupdate = function() {
                    if (video.duration - video.currentTime < 1.5) {
                        video.classList.add('shrink-effect');
                    }
                };

                video.onended = () => { 
                    layer.style.display = 'none'; 
                    video.style.display = 'none';
                    video.classList.remove('shrink-effect');
                };
            } else {
                video.style.display = 'none';
                emoji.src = currentSource;
                emoji.style.display = 'block';
                setTimeout(() => { layer.style.display = 'none'; emoji.style.display = 'none'; }, 3000);
            }
        }
    </script>
</body>
</html>
