<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaddy Pro Live Chat Room</title>
    
    <script>
        var isInsideApp = /FBAN|FBAV|Instagram|IMO|WhatsApp/i.test(navigator.userAgent);
        if (isInsideApp) {
            alert("সতর্কবার্তা: IMO/WhatsApp-এ মাইক্রোফোন কাজ করবে না। সেরা অভিজ্ঞতার জন্য লিঙ্কটি কপি করে Chrome ব্রাউজারে ব্যবহার করুন।");
        }
    </script>

    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #error-msg { color: #ff4444; margin-bottom: 20px; text-align: center; }
        .seat-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .seat {
            width: 70px; height: 70px; border-radius: 50%; background: #1a1a1a;
            border: 2px solid #333; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .seat.active { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .seat-icon { font-size: 24px; }
        .seat-label { font-size: 12px; margin-top: 5px; color: #888; }
    </style>
</head>
<body>

    <div id="error-msg"></div>

    <div class="seat-container">
        <div class="seat" onclick="joinSeat(1, this)">
            <div class="seat-icon">🎙️</div>
            <div class="seat-label">হোস্ট</div>
        </div>
        <div class="seat" onclick="joinSeat(2, this)">
            <div class="seat-icon">🛋️</div>
            <div class="seat-label">2</div>
        </div>
        <div class="seat" onclick="joinSeat(3, this)">
            <div class="seat-icon">🛋️</div>
            <div class="seat-label">3</div>
        </div>
        <div class="seat" onclick="joinSeat(4, this)">
            <div class="seat-icon">🛋️</div>
            <div class="seat-label">4</div>
        </div>
        <div class="seat" onclick="joinSeat(5, this)">
            <div class="seat-icon">🛋️</div>
            <div class="seat-label">5</div>
        </div>
    </div>

    <script>
        async function joinSeat(seatNumber, element) {
            const errorDisplay = document.getElementById('error-msg');
            errorDisplay.innerText = "মাইক সংযোগ করা হচ্ছে...";
            errorDisplay.style.color = "yellow";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });

                errorDisplay.innerText = "সফলভাবে সিট " + seatNumber + "-এ যুক্ত হয়েছেন!";
                errorDisplay.style.color = "#00ff00";
                document.querySelectorAll('.seat').forEach(s => s.classList.remove('active'));
                element.classList.add('active');
            } catch (err) {
                errorDisplay.innerText = "ভুল: ব্রাউজার থেকে মাইক্রোফোন অনুমতি দিন (Chrome ব্যবহার করুন)।";
                errorDisplay.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
