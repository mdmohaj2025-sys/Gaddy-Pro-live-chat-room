<!DOCTYPE html>
<html lang="bn">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #0f0f1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container {
            width: 400px; max-width: 100vw; height: 100vh; background: #1a1a2e;
            display: flex; flex-direction: column; position: relative; overflow: hidden;

        .circle { width: 46px; height: 46px; border-radius: 50%; background: #2a2a4a; display: flex; align-items: center; justify-content: center; border: 1px solid #444; overflow: hidden; position: relative; font-size: 18px; }

        .avatar-l { width: 46px; height: 46px; border-radius: 50%; background: #444; background-size: cover; position: relative; }.footer-nav { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #16213e; border-top: 1px solid #222; }
.nav-btn { width: 42px; height: 42px; border-radius: 50%; background: #2a2a4a; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; cursor: pointer; color: white; }
.full-page { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: #1a1a2e; z-index: 5000; transition: 0.3s; padding: 20px; overflow-y: auto; color: white; }

.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
.bottom-sheet { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 380px; max-width: 90vw; background: #1e1e3a; border-radius: 20px 20px 0 0; z-index: 2000; transition: 0.4s; padding: 15px 0; color: white; }

@keyframes floatAndFade {
    0% { opacity: 1; transform: translateY(0) scale(0.8); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }

}
.gift-overlay-new { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 6000; justify-content: center; align-items: flex-end; }

.panel-header h3 { font-size: 20px; font-weight: 700; }
.close-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.gift-grid-new { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; overflow-y: auto; flex: 1; padding: 0 5px 15px; }

.gift-box-new { width: 100%; aspect-ratio: 1/1; background: rgba(30,30,50,0.7); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); overflow: hidden; position: relative; font-size: 30px; }

.gift-label-new { background: rgba(255,51,102,0.2); border: 1px solid rgba(255,51,102,0.3); color: #ff7b9c; font-weight: 700; font-size: 13px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

.video-overlay-new { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 7000; justify-content: center; align-items: center; }
.video-overlay-new.active { display: flex; }
#introVideo { width: 100%; height: 100%; object-fit: cover; }        .emoji-overlay-new { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 7000; justify-content: center; align-items: center; }

        .full-page button { background: #e94560; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container" id="mainApp">

</div>

</div>

</div>
<!-- গিফট প্যানেল -->
<div class="gift-overlay-new" id="giftOverlayNew">
    <div class="gift-panel">
        <div class="coin-ring"><span class="coin-icon">🪙</span><span class="coin-amount" id="coinBalance">50000</span></div>
        <div class="profile-area"><img class="profile-pic-gift" id="giftTargetImg" src="https://via.placeholder.com/70"></div>

</div>

<div class="half-profile-view" id="halfProfileView">
    <button class="close-half-view" onclick="document.getElementById('halfProfileView').style.display='none'">✕</button>
    <img id="halfProfileImg" src="https://via.placeholder.com/100">
    <h3 id="halfProfileName"></h3>
    <p id="halfProfileUid"></p>
</div><script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyDXwE6T6fOBBIbxWIMBPJoHN4PD9NXazKw",
        authDomain: "moi-project-25509.firebaseapp.com",
        databaseURL: "https://moi-project-25509-default-rtdb.firebaseio.com",
        projectId: "moi-project-25509",
        storageBucket: "moi-project-25509.firebasestorage.app",
        messagingSenderId: "465225004410",
        appId: "1:465225004410:web:e266146adb1ccaca4992c3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const AGORA_APP_ID = "3e98fdc6be38445f9e121e0ca61fef95";
    const CHANNEL = "GaddyProTest"; // আপনার চ্যানেল নাম

    let localUid = localStorage.getItem("voiceclub_uid");
    let localUserData = null;
    let userCurrentSeat = null;
    let activeSeat = null;
    let giftTargetSeat = null;
    let isMuted = false;
    let selectedGiftId = null;
    let coinBalance = 50000;
    let agoraClient = null;
    let localAudioTrack = null;
    let rtmChannel = null;

    // ---------- ইউজার লগইন ----------
    if (!localUid) {
        // প্রথমবার এলে প্রোফাইল পপআপ (সরলীকৃত)
        let name = prompt("আপনার নাম লিখুন:");
        if (!name) name = "অতিথি";
        const userRef = db.ref('users').push();
        localUid = userRef.key;
        localUserData = { name, photoURL: 'https://via.placeholder.com/100', coins: 50000 };
        userRef.set(localUserData);
        localStorage.setItem('voiceclub_uid', localUid);
    } else {
        db.ref('users/' + localUid).once('value').then(snap => {
            if (snap.exists()) {
                localUserData = snap.val();
            } else {
                localStorage.removeItem('voiceclub_uid');
                location.reload();
            }
            startApp();
        });
    }
    if (localUserData) startApp();

    function startApp() {
        updateMyProfileUI();
        createSeats();
        listenSeatStates();
        listenGroupInfo();
        joinRoom();
        setMyPresence(true);
        updateCoinDisplay();
        renderGifts();
        setupEmojiGrid();
    }

    function updateMyProfileUI() {
        if (!localUserData) return;
        document.getElementById('myAvatar').style.backgroundImage = `url(${localUserData.photoURL})`;
        document.getElementById('myNameLabel').innerText = localUserData.name;
        document.getElementById('myUidLabel').innerText = `ID: ${localUid}`;
        coinBalance = localUserData.coins || 50000;
        updateCoinDisplay();
    }

    function createSeats() {
        const container = document.getElementById('seatsContainer');
        container.innerHTML = '';
        for (let i = 1; i <= 20; i++) {
            const seatId = i === 1 ? 'host' : i;
            container.innerHTML += `<div class="seat-item" data-seat="${seatId}" onclick="handleSeatClick(this, '${seatId}')"><div class="circle">🛋️<span class="lock-overlay">🔒</span><span class="mute-badge">🔇</span></div><div class="label" data-num="${seatId}">${seatId}</div></div>`;
        }
    }// 🔥 রিয়েল-টাইম সিট স্টেট (সবার জন্য)
function listenSeatStates() {
    db.ref('seats').on('value', snap => {
        const seats = snap.val() || {};
        document.querySelectorAll('.seat-item').forEach(el => {
            const sid = el.dataset.seat;
            const data = seats[sid];
            const circle = el.querySelector('.circle');
            const label = el.querySelector('.label');
            if (data && data.userId) {
                circle.innerHTML = `<img src="${data.photoURL}" class="user-img"><span class="lock-overlay" style="display:${data.locked?'block':'none'}">🔒</span><span class="mute-badge" style="display:${data.muted?'block':'none'}">🔇</span>`;
                label.innerText = data.name;
            } else {
                circle.innerHTML = `🛋️<span class="lock-overlay" style="display:${data?.locked?'block':'none'}">🔒</span><span class="mute-badge">🔇</span>`;
                label.innerText = sid;
            }
        });
        // অনলাইন কাউন্ট
        db.ref('activeUsers').once('value', s => {
            document.getElementById('onlineCount').innerText = `সদস্য: ${s.numChildren()}`;
        });
    });
}

// 🔥 গ্রুপ ইনফো (ছবি ও নাম) সবাই দেখবে
function listenGroupInfo() {
    db.ref('roomInfo').on('value', snap => {
        const data = snap.val() || {};
        if (data.name) document.getElementById('headerGroupName').innerText = data.name;
        if (data.photoURL) document.getElementById('headerAvatar').src = data.photoURL;
    });
}

function setMyPresence(active) {
    if (active) {
        db.ref(`activeUsers/${localUid}`).set({ name: localUserData?.name, photoURL: localUserData?.photoURL });
    } else {
        db.ref(`activeUsers/${localUid}`).remove();
        if (userCurrentSeat) removeSeatFromFirebase(userCurrentSeat.dataset.seat);
    }
}

function removeSeatFromFirebase(seatId) { db.ref(`seats/${seatId}`).remove(); }
function updateSeatInFirebase(seatId, data) { db.ref(`seats/${seatId}`).update(data); }

// Agora RTC + RTM
async function joinRoom() {
    agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
    localAudioTrack.setEnabled(false);
    await agoraClient.join(AGORA_APP_ID, CHANNEL, null, localUid);
    await agoraClient.publish(localAudioTrack);
    agoraClient.on('user-published', async (user, mediaType) => {
        await agoraClient.subscribe(user, mediaType);
        if (mediaType === 'audio') user.audioTrack.play();
    });

    // RTM
    const rtmClient = AgoraRTM.createInstance(AGORA_APP_ID);
    await rtmClient.login({ uid: localUid });
    rtmChannel = rtmClient.createChannel(CHANNEL);
    await rtmChannel.join();
    rtmChannel.on('ChannelMessage', (message, senderId) => {
        if (senderId === localUid) return;
        try {
            const data = JSON.parse(message.text);
            if (data.type === 'emoji') showRemoteFloatingEmoji(data.emoji, data.senderSeat);
            else if (data.type === 'gift') showRemoteGiftAnimation(data.gift, data.targetSeat);
        } catch(e) {}
    });
}

function sendRTMMessage(data) { if (rtmChannel) rtmChannel.sendMessage({ text: JSON.stringify(data) }); }

function showRemoteFloatingEmoji(emoji, senderSeatId) {
    const target = document.querySelector(`.seat-item[data-seat="${senderSeatId}"] .circle`) || document.querySelector('#bottom-profile .avatar-l');
    if (!target) return;
    const floatEl = document.createElement('div');
    floatEl.className = 'floating-emoji'; floatEl.textContent = emoji;
    target.appendChild(floatEl);
    floatEl.addEventListener('animationend', () => floatEl.remove());
}

function showRemoteGiftAnimation(gift, targetSeatId) {
    const targetSeat = document.querySelector(`.seat-item[data-seat="${targetSeatId}"]`);
    if (!targetSeat) return;
    const circle = targetSeat.querySelector('.circle');
    const fly = document.createElement('div');
    fly.className = 'fly-gift-to-seat'; fly.textContent = gift.icon;
    document.body.appendChild(fly);
    const r = circle.getBoundingClientRect();
    fly.style.left = '50%'; fly.style.top = '50%';
    requestAnimationFrame(() => {
        fly.style.left = (r.left + r.width/2 - 25) + 'px';
        fly.style.top = (r.top + r.height/2 - 25) + 'px';
        fly.style.transform = 'scale(0.3)';
    });
    fly.addEventListener('transitionend', () => {
        fly.remove();
        const drop = document.createElement('div');
        drop.className = 'drop-gift-on-seat'; drop.textContent = gift.icon;
        circle.appendChild(drop);
        drop.addEventListener('animationend', () => drop.remove());
    });
    }// Seat click handlers
function handleSeatClick(el, id) {

function takeMic() {
    const seatId = activeSeat.dataset.seat;
    if (activeSeat.querySelector('.lock-overlay').style.display === 'block') return alert("সিট লক!");
    if (userCurrentSeat) releaseMic(true);
    updateSeatInFirebase(seatId, {
        userId: localUid,
        name: localUserData.name,
        photoURL: localUserData.photoURL,
        locked: false,
        muted: false
    });
    userCurrentSeat = activeSeat;
    isMuted = false;
    if (localAudioTrack) localAudioTrack.setEnabled(true);
    document.getElementById('bottom-profile').style.visibility = 'hidden';
    closeAllMenus();
}

function releaseMic() {
    if (!userCurrentSeat) return;
    removeSeatFromFirebase(userCurrentSeat.dataset.seat);
    userCurrentSeat = null;
    if (localAudioTrack) localAudioTrack.setEnabled(false);
    document.getElementById('bottom-profile').style.visibility = 'visible';
    closeAllMenus();
}

function toggleLockOnSeat() {
    const seatId = activeSeat.dataset.seat;
    const locked = activeSeat.querySelector('.lock-overlay').style.display === 'block';
    updateSeatInFirebase(seatId, { locked: !locked });
    closeAllMenus();
}

function toggleMute() {
    isMuted = !isMuted;
    if (localAudioTrack) localAudioTrack.setEnabled(!isMuted);
    if (userCurrentSeat) updateSeatInFirebase(userCurrentSeat.dataset.seat, { muted: isMuted });
    document.getElementById('micOptionIcon').textContent = isMuted ? '🎤' : '🔇';
    document.getElementById('micOptionText').textContent = isMuted ? 'মাইক চালু করুন' : 'মাইক বন্ধ করুন';

}

        document.body.appendChild(fly);
        const circleRect = circle.getBoundingClientRect();

            croppie = new Croppie(document.getElementById('cropper-container'), {
                viewport: { width: 100, height: 100, type: 'square' },

            });
            croppie.bind({ url: ev.target.result });
