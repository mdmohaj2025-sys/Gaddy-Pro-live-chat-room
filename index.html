    function selectGender(gender) {
        selectedGender = gender;
        window.selectedGender = gender;
        document.getElementById('male-btn').classList.remove('active');
        document.getElementById('female-btn').classList.remove('active');
        if (gender === 'Male') document.getElementById('male-btn').classList.add('active');
        else if (gender === 'Female') document.getElementById('female-btn').classList.add('active');
    }

    function populateProfileWithGoogle(user, existingData) {
        googleUser = user;
        window.googleUser = user;
        if (existingData) {
            existingProfile = existingData;
            window.existingProfile = existingData;
            document.getElementById('nickname').value = existingData.nickname || user.displayName || "";
            document.getElementById('lastname').value = existingData.lastname || "";
            if (existingData.gender === 'Male') selectGender('Male');
            else if (existingData.gender === 'Female') selectGender('Female');
            else {
                document.getElementById('male-btn').classList.remove('active');
                document.getElementById('female-btn').classList.remove('active');
                selectedGender = "";
                window.selectedGender = "";
            }
            const previewImg = document.getElementById('preview');
            const picIcon = document.getElementById('pic-icon');
            if (existingData.photoURL) {
                previewImg.src = existingData.photoURL;
                previewImg.style.display = 'block';
                picIcon.style.display = 'none';
            } else if (user.photoURL) {
                previewImg.src = user.photoURL;
                previewImg.style.display = 'block';
                picIcon.style.display = 'none';
            } else {
                previewImg.style.display = 'none';
                picIcon.style.display = 'block';
            }
        } else {
            existingProfile = null;
            window.existingProfile = null;
            document.getElementById('nickname').value = user.displayName || "";
            document.getElementById('lastname').value = "";
            document.getElementById('male-btn').classList.remove('active');
            document.getElementById('female-btn').classList.remove('active');
            selectedGender = "";
            window.selectedGender = "";
            const previewImg = document.getElementById('preview');
            const picIcon = document.getElementById('pic-icon');
            if (user.photoURL) {
                previewImg.src = user.photoURL;
                previewImg.style.display = 'block';
                picIcon.style.display = 'none';
            } else {
                previewImg.style.display = 'none';
                picIcon.style.display = 'block';
            }
        }
        croppedImageBlob = null;
        window.croppedImageBlob = null;
        showProfileSetup();
    }

    function openCropModal(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const cropImage = document.getElementById('crop-image');
            cropImage.src = e.target.result;
            document.getElementById('crop-modal').style.display = 'flex';
            if (cropper) cropper.destroy();
            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 2,
                autoCropArea: 0.8,
                responsive: true,
                background: false,
            });
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    }

    function applyCrop() {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
        canvas.toBlob(function(blob) {
            croppedImageBlob = blob;
            window.croppedImageBlob = blob;
            const url = URL.createObjectURL(blob);
            const previewImg = document.getElementById('preview');
            previewImg.src = url;
            previewImg.style.display = 'block';
            document.getElementById('pic-icon').style.display = 'none';
            document.getElementById('crop-modal').style.display = 'none';
            if (cropper) { cropper.destroy(); cropper = null; }
        }, 'image/jpeg', 0.9);
    }

    function cancelCrop() {
        document.getElementById('crop-modal').style.display = 'none';
        if (cropper) { cropper.destroy(); cropper = null; }
    }

    window.showProfileSetup = showProfileSetup;

    window.showPhonePage = showPhonePage;
    window.hidePhonePage = hidePhonePage;
    window.selectGender = selectGender;
    window.populateProfileWithGoogle = populateProfileWithGoogle;
    window.openCropModal = openCropModal;
    window.applyCrop = applyCrop;
    window.cancelCrop = cancelCrop;
    window._redirectUserState = null;

                await set(userRefPath, profileData);

                alert(
                    `🎉 প্রোফাইল সংরক্ষিত!\n\nইউজার আইডি: ${uniqueUserId}\nনাম: ${nick || '—'}\nশেষ নাম: ${lastname || '—'}\nইমেইল: ${user.email || '—'}\nলিঙ্গ: ${gender || '—'}\n\nআপনার প্রোফাইল সুরক্ষিত হয়েছে।`
                );
                window.location.reload();
            } catch (error) {
                console.error("প্রোফাইল সংরক্ষণে ত্রুটি:", error);
                alert("কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন।");
            } finally {
                document.getElementById('confirmRegBtn').disabled = false;
                document.getElementById('confirmRegBtn').innerText = "কনফার্ম";
            }
        });
    </script>
</body>
</html>
