<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লাভা গিফট রুম</title>
    <style>
        /* পুরো স্ক্রিনের ডিজাইন */
        body { 
            margin: 0; 
            padding: 0;
            background: radial-gradient(circle, #2c3e50, #000000); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* গিফট বাটন ডিজাইন */
        .gift-btn { 
            padding: 20px 40px; 
            font-size: 22px; 
            background: linear-gradient(45deg, #ff416c, #ff4b2b); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.5);
            transition: transform 0.2s;
        }

        .gift-btn:active {
            transform: scale(0.95);
        }

        /* ভিডিও দেখানোর বক্স */
        #lavaContainer { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: black; 
            z-index: 9999; 
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <button class="gift-btn" onclick="playGift()">🔥 লাভা গিফট পাঠান</button>

    <div id="lavaContainer">
        <video id="lavaVideo" playsinline>
            <source src="https://github.com/mdmohaj2025-sys/Gaddy-Pro-live-chat-room/raw/refs/heads/main/GRNwcWsCmZtWZZKCsijaSOeRp0O.mp4" type="video/mp4">
            আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
        </video>
    </div>

    <script>
        function playGift() {
            const container = document.getElementById('lavaContainer');
            const video = document.getElementById('lavaVideo');
            
            // ভিডিওর লেয়ার দেখাবে
            container.style.display = 'block';
            
            // ভিডিও শুরু থেকে চলবে
            video.currentTime = 0;
            video.play();

            // ভিডিও শেষ হলে অটোমেটিক গায়েব হয়ে যাবে
            video.onended = function() {
                container.style.display = 'none';
            };
        }
    </script>

</body>
</html>
